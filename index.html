<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asteroids</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>Asteroids</h1>

    <nav id="hud" aria-label="Estado del juego">
      <div id="vidas-hud" aria-label="Vidas restantes"></div>

      <div class="hud-item">
        SCORE <strong id="display-puntaje">0</strong>
      </div>

      <div class="hud-item">
        NIVEL <strong id="display-nivel">1</strong>
      </div>

      <div class="hud-item">
        HI <strong id="display-record">0</strong>
      </div>
    </nav>
  </header>

  <main>

    <canvas id="juego" aria-label="Area principal del juego"></canvas>

  </main>

  <!-- inicio -->
  <dialog id="dlg-inicio" aria-labelledby="titulo-inicio">
    <h2 id="titulo-inicio">Asteroids</h2>

    <p>
      Destruye todos los asteroides.
    </p>

    <button class="btn" id="btn-iniciar">Iniciar</button>
  </dialog>

  <!-- pausa -->
  <dialog id="dlg-pausa" aria-labelledby="titulo-pausa">
    <h2 id="titulo-pausa">Pausa</h2>
  
    <p>Presiona <b>P</b> para continuar.</p> 
  
    <button class="btn" id="btn-continuar">Continuar</button>
  </dialog>

  <!-- fin -->
  <dialog id="dlg-fin" aria-labelledby="titulo-fin">
    <h2 id="titulo-fin">Game Over</h2>

    <p>Puntuación final</p>
    <output id="puntaje-final">0</output>

    <button class="btn" id="btn-reiniciar">Reiniciar</button>
  </dialog>

  <script type="module" src="js/game.js?v=20260421"></script>

</body>

</html>
